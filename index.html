<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberShop | Combos y Ofertas</title>
  <meta name="description" content="Catálogo de combos, apps y promociones CyberShop. Compra por WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg">
    <span class="orb orb-one"></span>
    <span class="orb orb-two"></span>
    <span class="orb orb-three"></span>
    <span class="neon-wave wave-one"></span>
    <span class="neon-wave wave-two"></span>
    <span class="grid-lines"></span>
    <span class="stars"></span>
  </div>

  <header class="hero">
    <nav class="nav">
      <a href="#" class="brand" aria-label="CyberShop inicio">
        <img id="brandLogo" class="brand-logo" src="logo-cybershop.png" alt="CyberShop logo">
        <span>
          <strong>CyberShop</strong>
          <small>Catálogo digital</small>
        </span>
      </a>
      <a class="nav-cta" id="topWhatsapp" target="_blank" rel="noopener">WhatsApp</a>
    </nav>

   <section class="hero-content">
      <section class="apps-logos" id="appsLogos" aria-label="Apps disponibles"></section>
    
      <h1>Combos, apps y promociones de CyberShop</h1>
    </section>
  </header>

  <main id="catalogo">
    <section class="controls-panel" aria-label="Buscar y filtrar productos">
      <input id="searchInput" type="search" placeholder="Buscar combo o app..." aria-label="Buscar productos" />
      <select id="categorySelect" aria-label="Filtrar por categoría">
        <option value="Todos">Todos</option>
      </select>
    </section>

    <section class="grid" id="productsGrid" aria-live="polite"></section>
    <p class="empty" id="emptyState">No encontramos productos con ese filtro.</p>
  </main>

  <a class="floating-whatsapp" id="floatingWhatsapp" target="_blank" rel="noopener" aria-label="Comprar por WhatsApp">
    <span>💬</span>
    WhatsApp
  </a>

  <footer>
    <strong>CyberShop</strong>
    <span>Compra rápida por WhatsApp</span>
  </footer>

  <script src="productos.js"></script>
  <script src="app.js"></script>
</body>
</html>
